name: Täglicher Podcast – Energie am Morgen

on:
  schedule:
    - cron: "0 8 * * *"    # 08:00 UTC = 10:00 Uhr MEZ
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  generate-podcast:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python 3.12 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Podcast generieren
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
        run: python podcast_generator.py

      - name: Episode committen
        run: |
          git config user.name  "Podcast-Bot"
          git config user.email "podcast-bot@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "🎙️ Neue Episode: $(date +'%d.%m.%Y')"
          git push
