name: Täglicher Podcast – Energie am Morgen

on:
  schedule:
    # Beide Crons bleiben aktiv – das Python-Skript erkennt und überspringt
    # doppelte Ausführungen automatisch. So läuft der Podcast immer um ca. 02:43
    # deutscher Zeit, egal ob Sommer- oder Winterzeit.
    - cron: "43 0 * * *"    # 00:43 UTC = 02:43 Uhr MESZ (Sommerzeit, UTC+2)
    - cron: "43 1 * * *"    # 01:43 UTC = 02:43 Uhr MEZ  (Winterzeit, UTC+1)

  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  generate-podcast:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python 3.12 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Faktenbasis aktualisieren (API-Daten)
        run: python update_facts.py

      - name: Podcast generieren
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          PODCAST_EMAIL: ${{ secrets.PODCAST_EMAIL }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
        run: python podcast_generator.py

      - name: Episode und Faktenbasis committen
        run: |
          git config user.name  "Podcast-Bot"
          git config user.email "podcast-bot@users.noreply.github.com"
          git add docs/ facts.txt
          git diff --staged --quiet || git commit -m "🎙️ Neue Episode + Faktenbasis: $(date +'%d.%m.%Y')"
          git push
