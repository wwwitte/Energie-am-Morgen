name: Täglicher Podcast – Energie am Morgen

on:
  schedule:
    - cron: "43 3 * * *"    # 03:43 UTC = 05:43 Uhr MESZ (Sommerzeit, UTC+2)
    - cron: "43 4 * * *"    # 04:43 UTC = 05:43 Uhr MEZ  (Winterzeit, UTC+1)

  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  generate-podcast:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python 3.12 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Podcast generieren
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
        run: python podcast_generator.py

      - name: Episode committen
        run: |
          git config user.name  "Podcast-Bot"
          git config user.email "podcast-bot@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "🎙️ Neue Episode: $(date +'%d.%m.%Y')"
          git push
